<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <p class="paragraph regular">I'm just a paragraph with extra bold text!</p>

    <p class="paragraph small">I'm a smaller paragraph, also with extra bold text!</p>

    <button id="confirm" class="button confirm">Confirm</button>
    <button id="cancel" class="button cancel">Cancel</button>
  
    <div class="div">I'm a div with thin text!</div>
    <div class="div">I'm a div with thin text and a child div!
        <div class="div child">
            I'm a smaller child div with extra bold text.
        </div>
    </div>

</body>
</html>
